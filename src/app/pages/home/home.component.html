<header class="flex flex-col text-center">
    <section class="p-20 h-[87vh] mt-20">
        <h1 class="text-5xl font-robtop-black py-6">Mateify🧉</h1>
        <h2 class="text-2xl font-mont-md">Administrá tus gastos, visualizá tus consumos y organizate con mate en mano.</h2>
        <div class="flex flex-row items-center justify-center gap-8 mt-16">
            <a href="/login" class="text-2xl text-white font-robtop-bold p-5 bg-gradient-to-br from-[#90A955] to-[#31572C] hover:bg-gradient-to-b rounded-2xl">Empezá hoy!</a>
            <a href="/about" class="text-base text-white font-medium p-4 bg-[#31572C] rounded-2xl">Conocenos!</a>
        </div>
    </section>
    @defer (on viewport) {
        <section class="h-[80vh] bg-[url('/finance_bg.jpg')] bg-cover bg-center text-black text-center flex flex-col justify-center p-16">
            <h1 class="text-4xl font-robtop-black">Organizá tus costos de forma profesional</h1>
            <h2 class="text-2xl font-robtop-bold pt-4">Con Mateify, nunca fue tan fácil administrar tus gastos</h2>
        </section>
    }@placeholder {
        <div class="w-full flex text-center">
            <h1 class="text-2xl font-bold">Loading content...</h1>
        </div>
    }
    <section>
        
    </section>
</header>
